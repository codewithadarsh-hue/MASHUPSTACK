<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smile Builders</title>
</head>
<body>
    <h1>Smile Builders</h1>
    <h3>not only build homes , we build smiles</h3>
    <form>
        <fieldset>
            <legend><h1>Contact Us</h1></legend>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" placeholder="Enter your name" required><br><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="4" cols="50" placeholder="Enter your message" maxlength="200" pattern=".[A-Za-z]" required ></textarea><br><br>
            <input type="submit" value="Submit">
        </fieldset>
        <p>&copy; 2026 <b>Smile Builders</b>. All rights reserved.</p>
    </form>
</body>
</html>
